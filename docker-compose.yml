services:
  ai-based-system:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: emotion-monitor
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - NEWS_API_KEY=${NEWS_API_KEY:-}
      - SERIAL_PORT=${SERIAL_PORT:-/dev/ttyUSB0}
      - CAMERA_SOURCE=${CAMERA_SOURCE:-browser}
      - CAMERA_ID=${CAMERA_ID:-0}
      - AUDIO_CHANNELS=${AUDIO_CHANNELS:-1}
      - DISPLAY=${DISPLAY:-}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - MEDIAPIPE_DISABLE_GPU=0
      - FACE_ANALYSIS_URL=http://127.0.0.1:8001
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./.env:/app/.env
      - ./LLM/model:/app/LLM/model
      - ./LLM/faiss_index:/app/LLM/faiss_index
      # X11 forwarding for camera display (Linux)
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    # Hardware devices - COMMENT these out if running on laptop without sensors
    # Uncomment when biometric sensor is connected on Maven Kit:
    # devices:
    #   - /dev/ttyUSB0:/dev/ttyUSB0  # Biometric sensor
    # For laptop camera/mic testing, run with:
    #   docker-compose run --device=/dev/video0 --device=/dev/snd ai-based-system
    # ports:
    #   - "8000:8000"  # FastAPI web app
    network_mode: host
    # Browser camera mode (default): do not map /dev/video0.
    # If you explicitly want host camera mode, set CAMERA_SOURCE=device
    # and uncomment /dev/video0 mapping.
    # No host media devices are required in browser mode.
    # If you switch to host device mode, map devices explicitly:
    # devices:
    #   - /dev/snd:/dev/snd
    #   - /dev/video0:/dev/video0
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: uvicorn web_app:app --host 0.0.0.0 --port 8000
    stdin_open: true
    tty: true
    restart: unless-stopped
